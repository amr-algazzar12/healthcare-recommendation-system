# =============================================================================
# synthea.properties
# Pinned Synthea configuration for the healthcare recommendation project.
# These settings control which conditions are modelled and output format.
# Do NOT change seed or population here — those are set in generate_data.sh.
# =============================================================================

# --- Output ---
exporter.csv.export = true
exporter.fhir.export = false
exporter.hospital.fhir.export = false
exporter.practitioner.fhir.export = false
exporter.symptoms.csv.export = false
exporter.ccda.export = false
exporter.text.export = false

# Keep all patients (alive and deceased) for a richer dataset
generate.only_alive_patients = false

# --- Condition modules to include ---
# Focused on chronic conditions relevant to the recommendation models
generate.default_modules = true

# --- Demographics ---
# Use Massachusetts defaults (set in generate_data.sh via state arg)
generate.demographics.zipcode_file = geography/demographics.csv